<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIABLO TENNIS CLUB GAME TABLE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>DIABLO TENNIS CLUB GAME TABLE</h1>

  <!-- PLAYER -->
  <section class="section">
    <div class="section-title">
      <span>PLAYER (<span id="playerCount">0</span>)</span>
      <button class="btn plus" id="addGuestBtn">+</button>
    </div>

    <div id="playerGrid" class="grid-5"></div>
  </section>

  <!-- GAME -->
  <section class="section">
    <div class="section-title">GAME</div>
    <div class="grid-5">
      <button class="btn game">GAME (1SET)</button>
      <button class="btn game">GAME (2SET)</button>
      <button class="btn game">GAME (3SET)</button>
      <button class="btn game">GAME (4SET)</button>
      <button class="btn game">GAME (5SET)</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
