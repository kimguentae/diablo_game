<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIABLO TENNIS CLUB GAME TABLE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>DIABLO TENNIS CLUB GAME TABLE</h1>

<section>
  <div class="section-title">PLAYER</div>
  <div id="playerGrid" class="grid"></div>
</section>

<section>
  <div class="section-title">FIXED PAIR</div>
  <div class="fixed-box">
    <div id="pairList"></div>
    <div class="add-btn" id="addPairBtn">+</div>
  </div>
</section>

<!-- FIXED PAIR MODAL -->
<div id="pairModal" class="modal">
  <div class="modal-content">
    <h3>고정 페어 선택</h3>
    <select id="pairSelect1"></select>
    <select id="pairSelect2"></select>
    <button id="confirmPairBtn">✔ 생성</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
